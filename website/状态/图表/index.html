<!doctype html>
<html lang="zh-CN">
<head>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f9a8d4">
<title>历史图表 | 示例服务器</title>
<link rel="icon" type="image/png" href="/assets/server-icon.png">
<link rel="stylesheet" href="../../assets/site.css?v=20260723e">
<link rel="stylesheet" href="../assets/telemetry.css?v=20260723a">
<script src="../../assets/chart.umd.min.js?v=4.5.1"></script>
<script src="../assets/history-charts.js?v=20260722r"></script>
<script src="/assets/lenis.min.js?v=1.3.25"></script>

<script src="../../assets/site.js?v=20260722u"></script>

<body class="history-page">
<header class="topbar"><div class="shell"><a class="brand" href="../../">示例服务器</a><nav class="nav" aria-label="站点导航"><a href="../../">首页</a><a href="../" aria-current="page">实时状态</a><a href="../../统计数据/">玩家统计</a><a href="../../配方/">配方</a><a href="../../附魔计算/">附魔计算</a><a href="../../经纬度/">经纬度</a></nav></div></header>
<main class="history-workspace">
<div class="history-toolbar">
<div class="history-heading"><h1 id="history-title">历史图表</h1><div class="history-meta"><p id="history-status">正在读取历史数据</p><small>数据来源：服务端采集器 HTTPS Push</small></div></div>
<nav class="history-metrics" aria-label="指标切换">
<a href="?metric=mspt" data-history-metric="mspt">MSPT</a>
<a href="?metric=process_cpu" data-history-metric="process_cpu">Java CPU</a>
<a href="?metric=process_memory" data-history-metric="process_memory">Java 内存</a>
<a href="?metric=host_cpu" data-history-metric="host_cpu">节点 CPU</a>
<a href="?metric=host_memory" data-history-metric="host_memory">节点内存</a>
<a href="?metric=network" data-history-metric="network">网络</a>
</nav>
<form class="history-filter" id="history-filter">
<label><span>开始时间</span><input id="history-from" name="from" type="text" autocomplete="off" spellcheck="false" placeholder="2026/07/22 00:00:00 或时间戳"></label>
<label><span>结束时间</span><input id="history-to" name="to" type="text" autocomplete="off" spellcheck="false" placeholder="2026/07/22 01:00:00 或时间戳"></label>
<button type="submit">查询</button>
</form>
<div class='history-presets' aria-label='快捷时间范围'>
<button type='button' data-history-range='2592000'>最近 1 月</button>
<button type='button' data-history-range='604800'>最近 1 周</button>
<button type='button' data-history-range='86400'>最近 1 天</button>
<button type='button' data-history-range='43200'>最近 12 小时</button>
<button class='active' type='button' data-history-range='3600'>最近 1 小时</button>
</div>
</div>
<div class="history-canvas"><canvas id="history-chart"></canvas></div>
<div class="history-legal"></div>
</main>
<script src="assets/chart-page.js?v=20260722r"></script>
</body>
</html>
