<html lang="zh-CN">
<head>

<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f9a8d4">
<meta name="description" content="生存服务器 实时运行状态。">
<title>实时状态 | 示例服务器</title>
<link rel="icon" type="image/png" href="/assets/server-icon.png">
<link rel="stylesheet" href="../assets/site.css?v=20260723e">
<link rel="stylesheet" href="assets/telemetry.css?v=20260723a">
<script src="../assets/chart.umd.min.js?v=4.5.1"></script>
<script src="assets/history-charts.js?v=20260722t"></script>
<script src="/assets/lenis.min.js?v=1.3.25"></script>
<script src="/assets/site-config.js?v=20260723e"></script>
<script src="/assets/server-status.js?v=20260723e"></script>
<script src="../assets/site.js?v=20260722u"></script>
</head>
<body class="status-page">
<header class="topbar"><div class="shell"><a class="brand" href="../">示例服务器</a><nav class="nav" aria-label="站点导航"><a href="../">首页</a><a href="./" aria-current="page">实时状态</a><a href="../统计数据/">玩家统计</a><a href="../配方/">配方</a><a href="../附魔计算/">附魔计算</a><a href="../经纬度/">经纬度</a></nav></div></header>
<main class="shell">
<div class="heading"><h1>实时状态</h1><div class="clock"><strong id="clock">-</strong><span>服务器时间</span></div></div>
<div class="state-line"><div class="state" id="state">读取中</div><div class="telemetry-origin">
<strong id="telemetry-origin">数据来源：服务端采集器 HTTPS Push</strong>
<span id="telemetry-mode">正在确认上报状态</span>
</div><div class="updated">数据更新于 <span id="updated">-</span></div></div>
<section class="section"><h2>Minecraft 进程</h2><div class="metrics">
<a class="metric history-card" href="./图表/?metric=mspt" data-mini-metric="mspt"><div class="metric-content"><span>MSPT</span><strong id="mspt">-</strong><small id="mspt-detail">P50 / P95 / P99</small></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<a class="metric history-card" href="./图表/?metric=process_cpu" data-mini-metric="process_cpu"><div class="metric-content"><span>CPU</span><strong id="process-cpu">-</strong><small>Java 进程</small></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<a class="metric history-card" href="./图表/?metric=process_memory" data-mini-metric="process_memory"><div class="metric-content"><span>内存</span><strong id="process-memory">-</strong><small>Java 工作集</small></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<div class="metric"><span>运行时间</span><strong id="uptime">-</strong><small>本次启动</small></div>
</div></section>
<section class="section"><h2>节点资源</h2><div class="resource-list">
<a class="resource-row history-card" href="./图表/?metric=host_cpu" data-mini-metric="host_cpu"><div class="metric-content"><div class="resource-head"><span>CPU</span><strong id="host-cpu">-</strong></div><div class="bar"><i id="host-cpu-bar"></i></div></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<a class="resource-row history-card" href="./图表/?metric=host_memory" data-mini-metric="host_memory"><div class="metric-content"><div class="resource-head"><span>内存</span><strong id="host-memory">-</strong></div><div class="bar"><i id="host-memory-bar"></i></div></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<div class="resource-row"><div class="resource-head"><span>磁盘 C:</span><strong id="disk">-</strong></div><div class="bar"><i id="disk-bar"></i></div></div>
</div></section>
<section class="section"><h2>节点网络</h2><div class="metrics network">
<a class="metric history-card" href="./图表/?metric=network" data-mini-metric="network"><div class="metric-content"><span>实时下载</span><strong id="rx-rate">-</strong><small>下载与上传历史</small></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<a class="metric history-card" href="./图表/?metric=network" data-mini-metric="network"><div class="metric-content"><span>实时上传</span><strong id="tx-rate">-</strong><small>下载与上传历史</small></div><canvas class="mini-chart" aria-hidden="true"></canvas></a>
<div class="metric"><span>累计接收</span><strong id="rx-total">-</strong><small>网卡启动后</small></div>
<div class="metric"><span>累计发送</span><strong id="tx-total">-</strong><small>网卡启动后</small></div>
</div></section>
<section class="section online-section"><h2>在线玩家</h2><div class="players">
<div class="player-group"><div class="player-group-head"><span>在线玩家</span><strong id="player-count">-</strong></div><div class="names" id="players"><div class="online-player-empty">读取中</div></div></div>
<div class="player-group"><div class="player-group-head"><span>在线假人</span><strong id="bot-count">-</strong></div><div class="names" id="bots"><div class="online-player-empty">读取中</div></div></div>
</div></section>
</main>
<footer class="site-footer"><div class="shell"><span>示例服务器</span><div class="filing"></div></div></footer>
<script src="assets/status.js?v=20260723e"></script>
</body>
</html>
