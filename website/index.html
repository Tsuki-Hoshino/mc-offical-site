<footer class="site-footer"><div class="shell"><span>示例服务器</span><div class="filing"></div></div></footer>
<script>
let clockOffset=null,skinUrls=new Map(),onlineSince=new Map();
const text=(id,value)=>document.getElementById(id).textContent=value;
const time=value=>{const date=new Date(value);return Number.isNaN(date.getTime())?'-':date.toLocaleString('zh-CN',{hour12:false})};
const isFresh=record=>window.MCServerStatus.isOnline(record);
function connectionDuration(value){
  const startedAt=new Date(value).getTime();
  if(!Number.isFinite(startedAt))return '在线时间未知';
  let seconds=Math.max(0,Math.floor((Date.now()+(clockOffset||0)-startedAt)/1000));
  const days=Math.floor(seconds/86400);seconds%=86400;
  const hours=Math.floor(seconds/3600);seconds%=3600;
  const minutes=Math.floor(seconds/60);seconds%=60;
  return '在线 '+(days?days+'天 ':'')+(hours?hours+'小时 ':'')+minutes+'分 '+String(seconds).padStart(2,'0')+'秒';
}
function createHomeAvatar(name){
  const avatar=document.createElement('span'),skinUrl=skinUrls.get(name.toLowerCase());
  avatar.className='avatar home-online-avatar';
  avatar.setAttribute('role','img');
  avatar.setAttribute('aria-label',name);
  if(skinUrl){avatar.classList.add('has-skin');avatar.style.setProperty('--skin','url('+skinUrl+')')}else{avatar.textContent=name.slice(0,1)}
  return avatar;
}
function renderOnline(id,items,empty){
  const list=document.getElementById(id);
  list.className='home-online-list';
  list.replaceChildren();
  if(!items||!items.length){const item=document.createElement('span');item.className='home-online-empty';item.textContent=empty;list.append(item);return}
  items.forEach(name=>{
    const row=document.createElement('a'),info=document.createElement('span'),label=document.createElement('span'),elapsed=document.createElement('small'),startedAt=onlineSince.get(name.toLowerCase());
    row.className='home-online-player';
    row.href='./统计数据/玩家/?id='+encodeURIComponent(name);
    info.className='home-online-info';
    label.className='home-online-name';
    label.textContent=name;
    elapsed.className='online-duration';
    if(startedAt){elapsed.dataset.onlineSince=startedAt;elapsed.textContent=connectionDuration(startedAt)}else{elapsed.textContent='在线时间未知'}
    info.append(label,elapsed);
    row.append(createHomeAvatar(name),info);
    list.append(row);
  });
}
function updateConnectionTimes(){document.querySelectorAll('[data-online-since]').forEach(element=>element.textContent=connectionDuration(element.dataset.onlineSince))}
function updateClock(){if(clockOffset!==null)text('server-clock',new Date(Date.now()+clockOffset).toLocaleString('zh-CN',{hour12:false}))}
function showOffline(){
  const state=document.getElementById('server-state');
  state.textContent='服务器已离线';
  state.className='server-state offline';
  clockOffset=null;onlineSince=new Map();
  ['online-count','bot-count','home-mspt','server-clock'].forEach(id=>text(id,'服务器已离线'));
  text('home-motd','服务器已离线');
  text('home-updated','服务器已离线');
  renderOnline('online-players',[],'服务器已离线');
  renderOnline('online-bots',[],'服务器已离线');
}
async function refresh(){
  try{
    const response=await fetch('./api/latest.php?type=status',{cache:'no-store'});
    if(!response.ok)throw new Error(response.status);
    const record=await response.json(),data=record.payload||{},runtime=data.runtime||{},state=document.getElementById('server-state');
    if(!isFresh(record)){showOffline();return}
    state.textContent=data.online?'服务器在线':'服务器离线';
    state.className='server-state '+(data.online?'online':'offline');
    text('online-count',data.online_count||0);
    text('bot-count',data.bot_count||0);
    text('home-mspt',runtime.mspt==null?'-':Number(runtime.mspt).toFixed(1)+' ms');
    text('home-motd','MOTD='+(data.motd||'服务器官网'));
    text('home-updated',time(record.received_at));
    skinUrls=new Map(Object.entries(data.skin_urls||{}).map(([name,url])=>[name.toLowerCase(),url]));
    onlineSince=new Map(Object.entries(data.online_since||{}).map(([name,value])=>[name.toLowerCase(),value]));
    renderOnline('online-players',data.online_players,'暂无玩家在线');
    renderOnline('online-bots',data.bots,'暂无假人在线');
    const serverTime=new Date(runtime.server_time);
    if(!Number.isNaN(serverTime.getTime())){clockOffset=serverTime.getTime()-Date.now();updateClock();updateConnectionTimes()}
  }catch(error){
    showOffline();
  }
}
document.querySelector('main').append(document.querySelector('.official-online'));
document.getElementById('copy-address').addEventListener('click',async event=>{
  const button=event.currentTarget,original=button.textContent;
  try{await navigator.clipboard.writeText((window.MCSiteConfig&&window.MCSiteConfig.serverAddress)||'mc.example.com');button.textContent='已复制'}catch(error){button.textContent='复制失败'}
  setTimeout(()=>button.textContent=original,1500);
});
refresh();setInterval(refresh,1000);setInterval(()=>{updateClock();updateConnectionTimes()},1000);
</script>
