plugins {
    id 'java-library'
}

base {
    archivesName = 'mc-official-site-collector-forge-1.21.11'
}

sourceSets.main.java.srcDir '../forge-eventbus7-common/src/main/java'

repositories {
    maven { url = 'https://maven.minecraftforge.net/' }
}

dependencies {
    compileOnly 'net.minecraftforge:forge:1.21.11-61.1.11:universal'
    compileOnly 'net.minecraftforge:fmlcore:1.21.11-61.1.11'
    compileOnly 'net.minecraftforge:fmlloader:1.21.11-61.1.11'
    compileOnly 'net.minecraftforge:javafmllanguage:1.21.11-61.1.11'
    compileOnly 'net.minecraftforge:eventbus:7.0.1'
    implementation project(':core')
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

tasks.named('jar') {
    from project(':core').sourceSets.main.output
    manifest { attributes 'Implementation-Version': project.version }
}
